<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SprintTimer Pro: Multi-Lobby</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .mode-selection, .setup { padding: 20px; background: #333; margin: 10px; border-radius: 10px; }
        canvas { background: black; width: 100%; max-width: 600px; height: 200px; border: 2px solid #555; }
        #photoFinishCanvas { height: 300px; cursor: crosshair; }
        .hidden { display: none; }
        .trigger-active { background: red !important; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { cursor: pointer; font-weight: bold; background: #2980b9; color: white; }
        .btn-start { background: #27ae60; }
    </style>
</head>
<body>

    <h1>SprintTimer Pro 🏃‍♂️</h1>

    <div class="setup">
        <input type="text" id="lobbyId" placeholder="Masukkan ID Lobby (cth: SUKMA2024)">
        <div class="mode-selection">
            <button onclick="switchMode('starter')">📢 Mod Pelepas</button>
            <button onclick="switchMode('finisher')">🏁 Mod Penamat</button>
        </div>
    </div>

    <div id="starterUI" class="hidden">
        <h2>Mod Pelepas (Starter)</h2>
        <p>Tetapkan Sensitiviti (Threshold):</p>
        <input type="range" id="thresholdSlider" min="0" max="255" value="150">
        <div id="vumeter" style="height:20px; background:gray; width:80%; margin:auto;">
            <div id="vuLevel" style="height:100%; width:0%; background:lime;"></div>
        </div>
        <p id="micStatus">Menunggu Bunyi Tembakan...</p>
    </div>

    <div id="finisherUI" class="hidden">
        <h2>Mod Penamat (Finisher)</h2>
        <div id="displayTime" style="font-size: 3em; font-family: monospace;">00:00.000</div>
        <video id="videoPreview" width="320" height="240" autoplay playsinline style="display:none"></video>
        <p>Imej Photo Finish (Slit-Scan):</p>
        <canvas id="photoFinishCanvas"></canvas>
        <br>
        <button onclick="resetRace()">Reset Larian</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Guna config anda yang asal
        const firebaseConfig = {
            apiKey: "AIzaSyB6cOX9OoM6-Z2r7svyGUaMC7SzwJzpF5Q",
            authDomain: "sprint-timer-v2.firebaseapp.com",
            databaseURL: "https://sprint-timer-v2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sprint-timer-v2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentLobby = "";
        let audioContext, analyser, dataArray;
        let isRunning = false;
        let startTime = 0;

        // --- FUNGSI TUKAR MOD ---
        window.switchMode = (mode) => {
            currentLobby = document.getElementById('lobbyId').value;
            if(!currentLobby) return alert("Sila masukkan ID Lobby dahulu!");

            document.getElementById('starterUI').classList.toggle('hidden', mode !== 'starter');
            document.getElementById('finisherUI').classList.toggle('hidden', mode !== 'finisher');

            if(mode === 'starter') initMic();
            if(mode === 'finisher') initFinisher();
        };

        // --- LOGIK PELEPAS (MIC TRIGGER) ---
        async function initMic() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new AudioContext();
            analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            detectSound();
        }

        function detectSound() {
            analyser.getByteFrequencyData(dataArray);
            let volume = Math.max(...dataArray);
            let threshold = document.getElementById('thresholdSlider').value;
            
            document.getElementById('vuLevel').style.width = (volume / 255 * 100) + "%";

            if (volume > threshold && !isRunning) {
                triggerStart();
            }
            requestAnimationFrame(detectSound);
        }

        function triggerStart() {
            isRunning = true;
            const raceRef = ref(db, 'races/' + currentLobby);
            set(raceRef, { state: 'running', startTime: Date.now() });
            document.body.style.background = "red";
            setTimeout(() => document.body.style.background = "#1a1a1a", 500);
        }

        // --- LOGIK PENAMAT (SLIT-SCAN) ---
        const canvas = document.getElementById('photoFinishCanvas');
        const ctx = canvas.getContext('2d');
        let slitX = 0;

        async function initFinisher() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('videoPreview').srcObject = stream;
            
            const raceRef = ref(db, 'races/' + currentLobby);
            onValue(raceRef, (snapshot) => {
                const data = snapshot.val();
                if(data?.state === 'running') {
                    startTime = data.startTime;
                    startFinisherLogic();
                } else if (data?.state === 'idle') {
                    stopFinisherLogic();
                }
            });
        }

        function startFinisherLogic() {
            isRunning = true;
            slitX = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            updateTimerAndSlitScan();
        }

        function updateTimerAndSlitScan() {
            if(!isRunning) return;

            // 1. Update Timer
            const diff = Date.now() - startTime;
            const ms = diff % 1000;
            const sec = Math.floor(diff / 1000) % 60;
            const min = Math.floor(diff / 60000);
            document.getElementById('displayTime').textContent = 
                `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}.${ms.toString().padStart(3,'0')}`;

            // 2. Slit-Scan (Ambil baris tengah video)
            const video = document.getElementById('videoPreview');
            const scanWidth = 2; // Lebar slit
            // Lukis bahagian tengah video ke kanvas pada posisi slitX
            ctx.drawImage(video, video.videoWidth/2, 0, scanWidth, video.videoHeight, slitX, 0, scanWidth, canvas.height);
            
            slitX += scanWidth;
            if(slitX > canvas.width) slitX = 0; // Loop kanvas jika penuh

            requestAnimationFrame(updateTimerAndSlitScan);
        }

        window.resetRace = () => {
            const raceRef = ref(db, 'races/' + currentLobby);
            set(raceRef, { state: 'idle', startTime: null });
            isRunning = false;
        };
    </script>
</body>
</html>
